name: Build ANGLE for Android (Zalith Hooked Driver)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your ANGLE fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ninja-build libgl1-mesa-dri libgl1

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE dependencies
        run: |
          cat << EOF > .gclient
          solutions = [
            {
              "name": ".",
              "url": "https://github.com/${{ github.repository }}.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            }
          ]
          target_os = [ "android" ]
          EOF
          gclient sync --no-history --shallow

      - name: Patch ANGLE to load Zalith Hooked Driver
        run: |
          python3 << 'EOF'
          import os, re, glob
          
          target_files = []
          for ext in ('*.c', '*.cpp', '*.cc', '*.h'):
              for filepath in glob.glob(f'third_party/**/{ext}', recursive=True):
                  try:
                      with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read()
                      if 'dlopen("libvulkan.so"' in content or "dlopen('libvulkan.so'" in content:
                          target_files.append(filepath)
                  except:
                      pass
          
          if not target_files:
              print("❌ Could not find any file containing dlopen(libvulkan.so)!")
              exit(1)
              
          print(f"Found target files: {target_files}")
          
          custom_func = '''
          static void* volk_zalith_loader() {
              const char* icd_path = getenv("VK_ICD_FILENAMES");
              if (icd_path) {
                  void* handle = dlopen(icd_path, RTLD_NOW | RTLD_LOCAL);
                  if (handle) return handle;
              }
              return dlopen("libvulkan.so", RTLD_NOW | RTLD_LOCAL);
          }
          '''
          
          for filepath in target_files:
              with open(filepath, 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read()
              
              if 'volk_zalith_loader' in content:
                  print(f"Already patched: {filepath}")
                  continue
                  
              if '#include <stdlib.h>' not in content:
                  content = '#include <stdlib.h>\n' + content
                  
              matches = list(re.finditer(r'#include.*\n', content))
              if matches:
                  last_match = matches[-1]
                  content = content[:last_match.end()] + custom_func + content[last_match.end():]
                  
              content = content.replace(
                  'handle = dlopen("libvulkan.so", RTLD_NOW | RTLD_LOCAL);',
                  'handle = volk_zalith_loader();'
              )
              content = content.replace(
                  'dlopen("libvulkan.so", RTLD_NOW | RTLD_LOCAL)',
                  'volk_zalith_loader()'
              )
              content = content.replace(
                  "dlopen('libvulkan.so', RTLD_NOW | RTLD_LOCAL)",
                  'volk_zalith_loader()'
              )
              
              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(content)
                  
              print(f"Patched {filepath} successfully!")
          EOF

      - name: Configure GN (Android arm64, Vulkan only, Optimized)
        run: |
          gn gen out/Android --args='
            target_os="android" 
            target_cpu="arm64" 
            is_component_build=false 
            is_debug=false 
            angle_enable_vulkan=true 
            angle_enable_gl=false 
            symbol_level=0
            angle_enable_vulkan_validation_layers=false
          '

      - name: Build ANGLE Libraries
        run: ninja -C out/Android libEGL_angle.so libGLESv2_angle.so

      - name: Test and Verify Libraries
        run: |
          echo "=== Verifying ELF Architecture ==="
          FILE_OUTPUT=$(file out/Android/libGLESv2_angle.so)
          echo $FILE_OUTPUT
          if echo "$FILE_OUTPUT" | grep -q "ELF 64-bit LSB shared object, ARM aarch64"; then
            echo "✅ Architecture is correct (arm64-v8a)."
          else
            echo "❌ Architecture is incorrect! Failing build."
            exit 1
          fi

          echo "=== Verifying EGL/GLES Symbols ==="
          if nm -D out/Android/libEGL_angle.so | grep -q "eglInitialize"; then
            echo "✅ libEGL_angle.so exports eglInitialize."
          else
            echo "❌ Missing EGL symbols!"
            exit 1
          fi
          
          if nm -D out/Android/libGLESv2_angle.so | grep -q "glDrawElements"; then
            echo "✅ libGLESv2_angle.so exports glDrawElements."
          else
            echo "❌ Missing GLES symbols!"
            exit 1
          fi

      - name: Corrections (Strip and Package)
        run: |
          mkdir -p release
          STRIP=$(find $GITHUB_WORKSPACE/third_party -name "llvm-strip" -type f | head -n 1)
          
          if [ -n "$STRIP" ]; then
            echo "✅ Using strip tool: $STRIP"
            $STRIP --strip-unneeded out/Android/libGLESv2_angle.so -o release/libGLESv2_angle.so
            $STRIP --strip-unneeded out/Android/libEGL_angle.so -o release/libEGL_angle.so
          else
            echo "⚠️ Strip tool not found! Copying unstripped libraries instead."
            cp out/Android/libGLESv2_angle.so release/libGLESv2_angle.so
            cp out/Android/libEGL_angle.so release/libEGL_angle.so
          fi
          
          echo "Final .so sizes:"
          ls -lh release/

      - name: Upload Android Libraries
        uses: actions/upload-artifact@v4
        with:
          name: angle-android-arm64-zalith-hook
          path: release/*.so
          retention-days: 30
