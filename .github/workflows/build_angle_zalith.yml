name: Build ANGLE for Android (Zalith Turnip Direct-Load Hook)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your ANGLE fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip ninja-build libgl1-mesa-dri libgl1

      - name: Setup depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

      - name: Fetch ANGLE dependencies
        run: |
          cat << EOF > .gclient
          solutions = [
            {
              "name": ".",
              "url": "https://github.com/${{ github.repository }}.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            }
          ]
          target_os = [ "android" ]
          EOF
          gclient sync --no-history --shallow

      - name: Patch ANGLE to dlopen the Turnip driver directly
        run: |
          python3 << 'PYEOF'
          target_file = 'src/libANGLE/renderer/vulkan/vk_renderer.cpp'

          with open(target_file, encoding='utf-8') as f:
              content = f.read()

          if 'ZalithOpenTurnipDirectly' in content:
              print(f"{target_file} already patched, skipping.")
          else:
              # --- Hunk 1: add the includes this hook needs ---------------------------
              old1 = '''#include <EGL/eglext.h>
          #include <fstream>

          #include "common/debug.h"'''
              new1 = '''#include <EGL/eglext.h>
          #include <fstream>

          #if defined(ANGLE_PLATFORM_ANDROID)
          #    include <dlfcn.h>
          #    include <sys/stat.h>
          #endif

          #include "common/debug.h"'''
              assert content.count(old1) == 1, (
                  f"Hunk 1 anchor not found exactly once (found {content.count(old1)}) "
                  f"in {target_file}. ANGLE's includes near the top of this file have "
                  "likely changed — update this workflow's old1/new1 to match."
              )
              content = content.replace(old1, new1)

              # --- Hunk 2: define the helper function in the anonymous namespace ------
              old2 = '''#if defined(ANGLE_ENABLE_VULKAN_API_DUMP_LAYER)
          constexpr bool kEnableVulkanAPIDumpLayer = true;
          #else
          constexpr bool kEnableVulkanAPIDumpLayer = false;
          #endif
          }  // anonymous namespace'''
              new2 = '''#if defined(ANGLE_ENABLE_VULKAN_API_DUMP_LAYER)
          constexpr bool kEnableVulkanAPIDumpLayer = true;
          #else
          constexpr bool kEnableVulkanAPIDumpLayer = false;
          #endif

          #if defined(ANGLE_PLATFORM_ANDROID)
          // --- Zalith Turnip direct-load hook -----------------------------------------
          // Zalith Launcher 2 (and MobileGlues) preload a Turnip Vulkan driver and expose
          // its containing directory via the DRIVER_PATH environment variable, but the
          // driver is never registered with the Android Vulkan HAL (it lives outside
          // /vendor/lib64/hw and Android's loader has no concept of VK_ICD_FILENAMES).
          // Since any conformant Vulkan ICD exports vkGetInstanceProcAddr directly, we
          // can dlopen the driver .so ourselves and hand that symbol to
          // volkInitializeCustom in place of the one obtained from the system
          // libvulkan.so. Returns the opened library handle (to be closed the same way
          // as the regular Vulkan library) or nullptr if nothing applicable was found,
          // in which case the caller should fall back to angle::vk::OpenLibVulkan().
          void *ZalithOpenTurnipDirectly()
          {
              const char *driverDir = getenv("DRIVER_PATH");
              if (!driverDir || driverDir[0] == '\\0')
              {
                  return nullptr;
              }

              char soPath[1024];
              snprintf(soPath, sizeof(soPath), "%s/libvulkan_freedreno.so", driverDir);

              struct stat st;
              if (stat(soPath, &st) != 0)
              {
                  return nullptr;
              }

              return dlopen(soPath, RTLD_NOW);
          }
          #endif  // defined(ANGLE_PLATFORM_ANDROID)
          }  // anonymous namespace'''
              assert content.count(old2) == 1, (
                  f"Hunk 2 anchor not found exactly once (found {content.count(old2)}) "
                  f"in {target_file}. The kEnableVulkanAPIDumpLayer block ANGLE uses to "
                  "close its top anonymous namespace has likely changed — update this "
                  "workflow's old2/new2 to match the current file."
              )
              content = content.replace(old2, new2)

              # --- Hunk 3: wire the helper into Renderer::initialize() ----------------
              old3 = '''        ANGLE_SCOPED_DISABLE_MSAN();
                  mLibVulkanLibrary = angle::vk::OpenLibVulkan();
                  ANGLE_VK_CHECK(context, mLibVulkanLibrary, VK_ERROR_INITIALIZATION_FAILED);'''
              # Note: source uses 8-space indent for this block; match exactly.
              old3 = (
                  "        ANGLE_SCOPED_DISABLE_MSAN();\n"
                  "        mLibVulkanLibrary = angle::vk::OpenLibVulkan();\n"
                  "        ANGLE_VK_CHECK(context, mLibVulkanLibrary, VK_ERROR_INITIALIZATION_FAILED);"
              )
              new3 = (
                  "        ANGLE_SCOPED_DISABLE_MSAN();\n"
                  "#if defined(ANGLE_PLATFORM_ANDROID)\n"
                  "        // Try loading a Turnip driver that Zalith Launcher 2 already preloaded via\n"
                  "        // DRIVER_PATH first; fall back to the normal system libvulkan.so if that's\n"
                  "        // not applicable (not running under Zalith, driver missing, etc).\n"
                  "        mLibVulkanLibrary = ZalithOpenTurnipDirectly();\n"
                  "        if (!mLibVulkanLibrary)\n"
                  "        {\n"
                  "            mLibVulkanLibrary = angle::vk::OpenLibVulkan();\n"
                  "        }\n"
                  "#else\n"
                  "        mLibVulkanLibrary = angle::vk::OpenLibVulkan();\n"
                  "#endif\n"
                  "        ANGLE_VK_CHECK(context, mLibVulkanLibrary, VK_ERROR_INITIALIZATION_FAILED);"
              )
              assert content.count(old3) == 1, (
                  f"Hunk 3 anchor not found exactly once (found {content.count(old3)}) "
                  f"in {target_file}. The OpenLibVulkan() call site inside "
                  "Renderer::initialize() has likely changed (or moved/reindented) — "
                  "update this workflow's old3/new3 to match the current file."
              )
              content = content.replace(old3, new3)

              with open(target_file, 'w', encoding='utf-8') as f:
                  f.write(content)

              print(f"Patched {target_file} successfully — all 3 hunks applied.")
          PYEOF

      - name: Configure GN (Android arm64, Vulkan only, Optimized)
        run: |
          gn gen out/Android --args='
            target_os="android"
            target_cpu="arm64"
            is_component_build=false
            is_debug=false
            angle_enable_vulkan=true
            angle_enable_gl=false
            symbol_level=0
            angle_enable_vulkan_validation_layers=false
          '

      - name: Build ANGLE Libraries
        run: ninja -C out/Android libEGL_angle.so libGLESv2_angle.so

      - name: Test and Verify Libraries
        run: |
          echo "=== Verifying ELF Architecture ==="
          FILE_OUTPUT=$(file out/Android/libGLESv2_angle.so)
          echo $FILE_OUTPUT
          if echo "$FILE_OUTPUT" | grep -q "ELF 64-bit LSB shared object, ARM aarch64"; then
            echo "✅ Architecture is correct (arm64-v8a)."
          else
            echo "❌ Architecture is incorrect! Failing build."
            exit 1
          fi

          echo "=== Verifying ZalithOpenTurnipDirectly symbol is present ==="
          if nm out/Android/libGLESv2_angle.so 2>/dev/null | grep -qi "ZalithOpenTurnipDirectly" || \
             strings out/Android/libGLESv2_angle.so | grep -qi "libvulkan_freedreno"; then
            echo "✅ Patch appears to be linked into the binary."
          else
            echo "❌ Could not find any trace of the patch in the built library — it was likely optimized away or not actually applied. Failing build."
            exit 1
          fi

          echo "=== Verifying EGL/GLES Symbols ==="
          if nm -D out/Android/libEGL_angle.so | grep -q "eglInitialize"; then
            echo "✅ libEGL_angle.so exports eglInitialize."
          else
            echo "❌ Missing EGL symbols!"
            exit 1
          fi

          if nm -D out/Android/libGLESv2_angle.so | grep -q "glDrawElements"; then
            echo "✅ libGLESv2_angle.so exports glDrawElements."
          else
            echo "❌ Missing GLES symbols!"
            exit 1
          fi

      - name: Package (unstripped — keep symbols for debugging first)
        run: |
          mkdir -p release
          cp out/Android/libGLESv2_angle.so release/libGLESv2_angle.so
          cp out/Android/libEGL_angle.so release/libEGL_angle.so
          echo "Final .so sizes:"
          ls -lh release/

      - name: Upload Android Libraries
        uses: actions/upload-artifact@v4
        with:
          name: angle-android-arm64-zalith-turnip-direct
          path: release/*.so
          retention-days: 30
